name: Backend Deploy

# Chạy khi tạo GitHub Release với tag bắt đầu bằng "backend-v" (VD: backend-v0.1.0).
# Build + push image luôn chạy được qua workflow_dispatch để test mà không cần deploy thật
# (bước SSH deploy chỉ chạy khi có đủ secrets DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY).
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy lên server sau khi build? (cần đã cấu hình secrets)"
        type: boolean
        default: false
      reseed:
        description: "[HUỶ DIỆT] Xoá sạch DB production và chạy lại prisma/seed.ts — mất toàn bộ user/session/ledger thật. Chỉ chạy khi confirm_reseed khớp."
        type: boolean
        default: false
      confirm_reseed:
        description: "Gõ đúng chữ RESEED để xác nhận (chỉ cần khi reseed=true)"
        type: string
        default: ""

env:
  IMAGE: ghcr.io/${{ github.repository }}/backend

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'backend-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=manual-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: ${{ github.event_name == 'release' || inputs.deploy == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (docker compose pull && up -d)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

  reseed-production:
    # Chạy tay riêng, KHÔNG gắn với release/deploy tự động — xoá sạch user/session/ledger
    # thật trên production rồi seed lại dữ liệu demo (175 loài, 4 loại trứng economy v2,
    # 10 tài khoản tester). Chỉ dùng khi sản phẩm còn ở giai đoạn phát triển, chưa có
    # người dùng thật cần giữ lại. Cổng an toàn kép: input `reseed` phải bật VÀ
    # `confirm_reseed` phải gõ đúng "RESEED" — thiếu 1 trong 2 thì job tự bỏ qua.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.reseed == true && inputs.confirm_reseed == 'RESEED' }}
    runs-on: ubuntu-latest
    steps:
      - name: Reseed via SSH (cài tạm ts-node/typescript trong container rồi chạy prisma db seed)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            CID=$(docker compose -f docker-compose.prod.yml ps -q api)
            docker exec "$CID" npm install --no-save ts-node typescript
            docker exec "$CID" npx prisma db seed
