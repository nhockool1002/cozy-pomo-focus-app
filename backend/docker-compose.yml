# Dev: build image locally. Dùng cho máy dev, không dùng file này trên server.
# Trên aaPanel dùng docker-compose.prod.yml (kéo image có sẵn từ ghcr.io).
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cozypomo
      POSTGRES_USER: cozypomo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozypomo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
