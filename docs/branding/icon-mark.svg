<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <defs>
    <radialGradient id="eggGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="45%" stop-color="#F4D160"/>
      <stop offset="100%" stop-color="#E8935A"/>
    </radialGradient>
  </defs>

  <!-- nen -->
  <rect width="108" height="108" fill="#A8D08D"/>

  <!-- noi dung chinh, thu nho ~0.85 quanh tam de nam gon trong safe-zone adaptive icon -->
